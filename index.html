<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>しふめも</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg1:#b2ede6;--bg2:#d8f5f0;--bg3:#e8faf7;
  --main:#9EDFD6;--accent:#7BC6BE;--accent2:#5aafa6;
  --text:#3A3A3A;--subtext:#6a9e99;--card:rgba(255,255,255,0.18);
  --card-border:rgba(255,255,255,0.45);--card-blur:blur(28px);
  --shadow:rgba(126,198,190,0.25);--shadow2:rgba(126,198,190,0.15);
  --kari-bg:rgba(158,223,214,0.22);--kari-border:#9EDFD6;
  --confirm-bg:rgba(123,198,190,0.22);--sun:#FF7F8A;--sat:#7BC6BE;--danger:#ff8c94;
  --blob1:#a8edd8;--blob2:#c5f0e8;--blob3:#ffd6e0;
}
.theme-blue{
  --bg1:#a8c8ff;--bg2:#cfe0ff;--bg3:#e8f0ff;
  --main:#BFD7FF;--accent:#8FB6FF;--accent2:#6b9fff;
  --text:#2F3440;--subtext:#6a82b0;--card:rgba(255,255,255,0.18);
  --card-border:rgba(255,255,255,0.45);--card-blur:blur(28px);
  --shadow:rgba(143,182,255,0.25);--shadow2:rgba(143,182,255,0.15);
  --kari-bg:rgba(191,215,255,0.25);--kari-border:#BFD7FF;
  --confirm-bg:rgba(143,182,255,0.22);--sun:#FF7F8A;--sat:#8FB6FF;
  --blob1:#b8d4ff;--blob2:#d4e8ff;--blob3:#ffd6e0;
}
.theme-peach{
  --bg1:#ffb3b8;--bg2:#ffd6d8;--bg3:#fff0f2;
  --main:#FFB7B2;--accent:#FF8C94;--accent2:#ff6b76;
  --text:#3D3D3D;--subtext:#b07070;--card:rgba(255,255,255,0.18);
  --card-border:rgba(255,255,255,0.45);--card-blur:blur(28px);
  --shadow:rgba(255,140,148,0.25);--shadow2:rgba(255,140,148,0.15);
  --kari-bg:rgba(255,183,178,0.22);--kari-border:#FFB7B2;
  --confirm-bg:rgba(255,140,148,0.18);--sun:#FF7F8A;--sat:#FFB7B2;
  --blob1:#ffcdd0;--blob2:#ffe0d8;--blob3:#c8f0ea;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'M PLUS Rounded 1c',sans-serif;color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;padding-bottom:80px;overflow-x:hidden;position:relative;background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 45%,var(--bg3) 100%);transition:background .5s;}
body::before,body::after,.bg-blob3{content:'';position:fixed;border-radius:50%;filter:blur(50px);pointer-events:none;z-index:0;opacity:0.55;}
body::before{width:280px;height:280px;top:-60px;right:-60px;background:radial-gradient(circle,var(--blob1),transparent 70%);animation:blobFloat1 8s ease-in-out infinite alternate;}
body::after{width:240px;height:240px;bottom:80px;left:-70px;background:radial-gradient(circle,var(--blob2),transparent 70%);animation:blobFloat2 10s ease-in-out infinite alternate;}
.bg-blob3{width:180px;height:180px;top:45%;right:-40px;background:radial-gradient(circle,var(--blob3),transparent 70%);animation:blobFloat3 12s ease-in-out infinite alternate;}
@keyframes blobFloat1{from{transform:translate(0,0) scale(1)}to{transform:translate(-20px,30px) scale(1.1)}}
@keyframes blobFloat2{from{transform:translate(0,0) scale(1)}to{transform:translate(25px,-20px) scale(1.08)}}
@keyframes blobFloat3{from{transform:translate(0,0) scale(1)}to{transform:translate(-15px,25px) scale(1.05)}}

.app-header{position:sticky;top:0;z-index:90;padding:10px 14px 8px;}
.summary-card{background:var(--card);backdrop-filter:var(--card-blur);-webkit-backdrop-filter:var(--card-blur);border:1px solid var(--card-border);border-radius:22px;padding:14px 16px 12px;box-shadow:0 8px 32px var(--shadow);position:relative;z-index:1;}
.month-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:10px;}
.nav-btn{background:var(--main);border:none;border-radius:50%;width:28px;height:28px;font-size:15px;font-weight:900;cursor:pointer;color:var(--text);transition:transform .1s;display:flex;align-items:center;justify-content:center;}
.nav-btn:active{transform:scale(.88);}
.month-label{font-size:17px;font-weight:900;color:var(--accent);letter-spacing:1px;}
.stats-row{display:grid;grid-template-columns:1fr 1px 1fr 1px 1fr;margin-bottom:10px;}
.stat-div{background:#eee;}
.stat-item{text-align:center;padding:0 4px;}
.stat-lbl{font-size:10px;color:var(--subtext);margin-bottom:2px;}
.stat-val{font-size:15px;font-weight:900;color:var(--accent);line-height:1.1;}
.goal-row{display:flex;align-items:center;gap:8px;}
.goal-prog{flex:1;height:7px;background:#eee;border-radius:10px;overflow:hidden;}
.goal-fill{height:100%;background:linear-gradient(90deg,var(--main),var(--accent));border-radius:10px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.goal-txt{font-size:11px;font-weight:700;color:var(--accent);white-space:nowrap;cursor:pointer;text-decoration:underline dotted;text-underline-offset:2px;}

.tab-bar{display:flex;background:var(--card);backdrop-filter:var(--card-blur);-webkit-backdrop-filter:var(--card-blur);border:1px solid var(--card-border);border-radius:16px;padding:4px;margin:8px 14px;box-shadow:0 2px 10px var(--shadow2);position:relative;z-index:1;}
.tab-btn{flex:1;padding:8px 4px;border:none;background:none;font-family:inherit;font-size:12px;font-weight:700;color:var(--subtext);border-radius:12px;cursor:pointer;transition:all .2s;}
.tab-btn.active{background:var(--main);color:var(--text);box-shadow:0 2px 8px var(--shadow);}

.cal-wrap{padding:0 14px 10px;position:relative;z-index:1;}
.cal-card{background:var(--card);backdrop-filter:var(--card-blur);-webkit-backdrop-filter:var(--card-blur);border:1px solid var(--card-border);border-radius:22px;padding:12px 10px;box-shadow:0 4px 18px var(--shadow2);}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:4px;}
.cal-dow span{font-size:11px;font-weight:800;padding:3px 0;}
.cal-dow .sun{color:var(--sun);}.cal-dow .sat{color:var(--sat);}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day{border-radius:10px;padding:3px 2px 4px;cursor:pointer;transition:all .15s;min-height:54px;display:flex;flex-direction:column;align-items:center;position:relative;}
.cal-day:active{transform:scale(.93);}
.cal-day.empty{cursor:default;pointer-events:none;}
.cal-day.today{background:var(--main)!important;}
.cal-day.has-c{background:var(--confirm-bg);}
.cal-day.has-k{background:var(--kari-bg);border:1.5px dashed var(--kari-border);}
.cal-day.has-ck{background:linear-gradient(135deg,var(--confirm-bg) 50%,var(--kari-bg) 50%);border:1.5px dashed var(--kari-border);}
.cal-day:not(.empty):not(.has-c):not(.has-k):not(.has-ck):hover{background:var(--kari-bg);}
.day-num{font-size:11px;font-weight:800;line-height:1;margin-bottom:1px;align-self:flex-start;margin-left:3px;}
.col-sun .day-num{color:var(--sun);}.col-sat .day-num{color:var(--sat);}
.day-chips{display:flex;flex-direction:column;align-items:center;gap:1px;width:100%;}
.day-chip{width:100%;text-align:center;}
.chip-co{font-size:7px;font-weight:700;color:var(--subtext);line-height:1.1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;}
.chip-am{font-size:9px;font-weight:900;color:var(--accent);line-height:1.2;}
.kari-dot{position:absolute;top:2px;right:2px;width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:.7;}

.co-wrap{padding:0 14px;position:relative;z-index:1;}
.sec-title{font-size:13px;font-weight:800;color:var(--subtext);margin:12px 0 8px;letter-spacing:.5px;}
.co-card{background:var(--card);backdrop-filter:var(--card-blur);-webkit-backdrop-filter:var(--card-blur);border:1px solid var(--card-border);border-radius:18px;padding:14px 16px;margin-bottom:10px;box-shadow:0 3px 14px var(--shadow2);}
.co-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.co-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.co-name{font-size:15px;font-weight:900;flex:1;}
.ico-btn{background:rgba(255,255,255,0.5);border:none;border-radius:8px;width:28px;height:28px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:transform .1s;}
.ico-btn:active{transform:scale(.88);}
.amt-patterns{display:flex;flex-wrap:wrap;gap:6px;}
.amt-badge{display:inline-flex;align-items:center;gap:4px;background:var(--kari-bg);border-radius:10px;padding:5px 10px;font-size:13px;font-weight:800;color:var(--accent);}
.amt-badge .del-x{font-size:11px;color:#bbb;cursor:pointer;font-weight:900;}
.add-co-btn{width:100%;background:none;border:2px dashed var(--main);border-radius:18px;padding:14px;font-family:inherit;font-size:14px;font-weight:800;color:var(--accent);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.add-co-btn:active{background:var(--kari-bg);}

.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.2);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .18s ease;}
.overlay.hidden{display:none!important;}
.sheet{background:rgba(255,255,255,0.30);backdrop-filter:blur(36px);-webkit-backdrop-filter:blur(36px);border:1px solid rgba(255,255,255,0.50);border-radius:26px 26px 0 0;padding:20px 20px 100px;width:100%;max-width:430px;box-shadow:0 -8px 30px rgba(0,0,0,.08);animation:slideUp .28s cubic-bezier(.4,0,.2,1);max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.sh-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px;}
.sh-title{font-size:16px;font-weight:900;color:var(--accent);text-align:center;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.close-btn{background:#f0f0f0;border:none;border-radius:50%;width:28px;height:28px;font-size:13px;cursor:pointer;color:#999;}

.entries-list{margin-bottom:14px;}
.entry-item{display:flex;align-items:center;gap:10px;background:var(--kari-bg);border-radius:14px;padding:10px 12px;margin-bottom:7px;}
.entry-item.ek{background:rgba(255,255,255,0.4);border:1.5px dashed var(--kari-border);}
.e-clr{width:8px;height:36px;border-radius:4px;flex-shrink:0;}
.e-info{flex:1;}
.e-co{font-size:13px;font-weight:800;color:var(--text);}
.e-kb{font-size:10px;background:var(--accent);color:white;border-radius:6px;padding:1px 5px;font-weight:700;margin-left:4px;}
.e-am{font-size:16px;font-weight:900;color:var(--accent);}
.e-del{background:none;border:none;font-size:16px;cursor:pointer;color:#ccc;padding:4px;}

.steps{display:flex;gap:6px;margin-bottom:14px;align-items:center;}
.step{font-size:11px;font-weight:700;color:var(--subtext);padding:4px 10px;border-radius:8px;background:rgba(255,255,255,0.35);}
.step.active{background:var(--main);color:var(--text);}
.step-sep{color:#ccc;font-size:12px;}
.back-lnk{font-size:12px;color:var(--accent);font-weight:700;cursor:pointer;display:inline-block;margin-bottom:12px;}
.co-sel-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
.co-sel-btn{background:rgba(255,255,255,0.22);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1.5px solid rgba(255,255,255,0.45);border-radius:14px;padding:10px 12px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s;}
.co-sel-btn:active{background:rgba(255,255,255,0.45);border-color:var(--accent);}
.csd{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.csn{font-size:13px;font-weight:800;}

.lbl-sm{font-size:12px;font-weight:700;color:var(--subtext);margin-bottom:8px;}
.amt-presets{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;min-height:10px;}
.amt-preset-btn{background:rgba(255,255,255,0.3);border:1.5px solid rgba(255,255,255,0.5);border-radius:12px;padding:9px 16px;font-family:inherit;font-size:15px;font-weight:800;color:var(--accent);cursor:pointer;transition:all .15s;}
.amt-preset-btn:active,.amt-preset-btn.sel{background:var(--main);border-color:var(--accent);color:var(--text);}
.amt-input-wrap{position:relative;margin-bottom:14px;}
.amt-yen{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;font-weight:900;color:var(--subtext);pointer-events:none;}
.amt-input{width:100%;border:1.5px solid rgba(255,255,255,0.50);border-radius:12px;padding:14px 14px 14px 34px;font-size:22px;font-weight:900;font-family:inherit;color:var(--text);background:rgba(255,255,255,0.25);outline:none;transition:border-color .2s;}
.amt-input:focus{border-color:var(--accent);background:rgba(255,255,255,0.45);}

.kari-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,255,255,0.22);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:12px;border:1.5px solid rgba(255,255,255,0.45);cursor:pointer;margin-bottom:14px;user-select:none;}
.tog-sw{width:38px;height:22px;background:#ddd;border-radius:11px;position:relative;transition:background .2s;flex-shrink:0;}
.tog-sw.on{background:var(--accent);}
.tog-sw::after{content:'';position:absolute;width:18px;height:18px;background:white;border-radius:50%;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.18);}
.tog-sw.on::after{left:18px;}
.tog-lbl{font-size:13px;font-weight:700;}

.field-lbl{font-size:12px;font-weight:700;color:var(--subtext);display:block;margin-bottom:5px;}
.field-in{width:100%;border:1.5px solid rgba(255,255,255,0.50);border-radius:12px;padding:10px 14px;font-size:14px;font-family:inherit;color:var(--text);background:rgba(255,255,255,0.25);outline:none;margin-bottom:12px;transition:border-color .2s;}
.field-in:focus{border-color:var(--accent);background:rgba(255,255,255,0.45);}
.clr-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.clr-sw{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;}
.clr-sw.sel{border-color:var(--text);transform:scale(1.1);}

.main-btn{width:100%;background:linear-gradient(135deg,var(--main),var(--accent));border:none;border-radius:16px;padding:14px;font-size:16px;font-weight:900;font-family:inherit;color:white;cursor:pointer;box-shadow:0 4px 16px var(--shadow);transition:transform .1s;}
.main-btn:active{transform:scale(.97);}
.sub-btn{width:100%;background:var(--main);border:none;border-radius:16px;padding:13px;font-size:15px;font-weight:900;font-family:inherit;color:var(--text);cursor:pointer;transition:transform .1s;}
.sub-btn:active{transform:scale(.97);}
.del-btn{width:100%;background:none;border:1.5px solid var(--danger);border-radius:16px;padding:11px;font-size:13px;font-weight:800;font-family:inherit;color:var(--danger);cursor:pointer;margin-top:8px;}

.c-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.2);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;animation:fadeIn .18s ease;padding:20px;}
.c-overlay.hidden{display:none!important;}
.modal{background:rgba(255,255,255,0.30);backdrop-filter:blur(36px);-webkit-backdrop-filter:blur(36px);border:1px solid rgba(255,255,255,0.50);border-radius:24px;padding:24px 22px;width:100%;max-width:320px;box-shadow:0 12px 40px rgba(0,0,0,.10);animation:popIn .25s cubic-bezier(.4,0,.2,1);}
.modal-ttl{font-size:16px;font-weight:900;color:var(--accent);text-align:center;margin-bottom:16px;}

.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,0.18);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-top:1px solid rgba(255,255,255,0.45);padding:8px 20px 18px;display:flex;align-items:center;justify-content:center;gap:10px;z-index:100;}
.th-btn{width:28px;height:28px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all .2s;}
.th-btn.active{border-color:var(--accent);transform:scale(1.18);}
.th-btn.t1{background:#3CBFB4;}.th-btn.t2{background:#5B9BFF;}.th-btn.t3{background:#FF6B7A;}
.th-lbl{font-size:10px;color:var(--subtext);font-weight:700;margin-right:2px;}
.bar-sep{width:1px;height:22px;background:#ddd;margin:0 4px;}
.bg-img-btn{background:rgba(255,255,255,0.6);border:1.5px solid var(--card-border);border-radius:10px;padding:4px 10px;font-family:inherit;font-size:11px;font-weight:800;color:var(--accent);cursor:pointer;white-space:nowrap;}
.bg-img-btn:active{transform:scale(.95);}

body.has-bg-img{background:none!important;}
body.has-bg-img .bg-blob3,body.has-bg-img::before,body.has-bg-img::after{display:none;}
#bgImageLayer{position:fixed;inset:0;z-index:-1;background-size:cover;background-position:center;background-repeat:no-repeat;}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.hourly-toggle{font-size:12px;font-weight:800;color:var(--accent);cursor:pointer;text-align:center;padding:8px;margin-bottom:10px;background:rgba(255,255,255,0.2);border-radius:10px;border:1.5px dashed rgba(255,255,255,0.5);}
.hourly-toggle:active{background:rgba(255,255,255,0.35);}
.emo-big{font-size:36px;display:block;margin-bottom:8px;}
</style>
</head>
<body>
<div id="bgImageLayer"></div>
<input type="file" id="bgFileIn" accept="image/*" style="display:none;">
<div class="bg-blob3"></div>

<div class="app-header">
  <div class="summary-card">
    <div class="month-nav">
      <button class="nav-btn" id="prevM">‹</button>
      <div class="month-label" id="mLbl"></div>
      <button class="nav-btn" id="nextM">›</button>
    </div>
    <div class="stats-row">
      <div class="stat-item"><div class="stat-lbl">月合計</div><div class="stat-val" id="sM">¥0</div></div>
      <div class="stat-div"></div>
      <div class="stat-item"><div class="stat-lbl">仮含む合計</div><div class="stat-val" id="sK">¥0</div></div>
      <div class="stat-div"></div>
      <div class="stat-item"><div class="stat-lbl">年間累計</div><div class="stat-val" id="sY">¥0</div></div>
    </div>
    <div class="goal-row">
      <div class="goal-prog"><div class="goal-fill" id="gFill" style="width:0%"></div></div>
      <div class="goal-txt" id="gTxt">目標未設定</div>
    </div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" id="tCal">📅 カレンダー</button>
  <button class="tab-btn" id="tCo">🏢 バイト先管理</button>
</div>

<div id="vCal" class="cal-wrap">
  <div class="cal-card">
    <div class="cal-dow">
      <span class="sun">日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span class="sat">土</span>
    </div>
    <div class="cal-days" id="calDays"></div>
  </div>
</div>

<div id="vCo" class="co-wrap" style="display:none;">
  <div class="sec-title">登録済みバイト先</div>
  <div id="coList"></div>
  <button class="add-co-btn" id="addCoBtn">＋ バイト先を追加</button>
</div>

<!-- DAY OVERLAY -->
<div class="overlay hidden" id="dayOv">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-title"><span></span><span id="dayTtl"></span><button class="close-btn" id="closeDayBtn">✕</button></div>
    <div class="entries-list" id="eList"></div>
    <div id="s1">
      <div class="steps">
        <span class="step active">① バイト先を選ぶ</span>
        <span class="step-sep">›</span>
        <span class="step">② 金額を入力</span>
      </div>
      <div class="co-sel-grid" id="coSelGrid"></div>
      <div class="empty-st" id="noCoMsg" style="display:none;"><span class="emo-big">🏢</span>まず「バイト先管理」でバイト先を登録してね</div>
    </div>
    <div id="s2" style="display:none;">
      <div class="steps">
        <span class="step">① バイト先</span>
        <span class="step-sep">›</span>
        <span class="step active">② 金額を入力</span>
      </div>
      <span class="back-lnk" id="backLnk">‹ バイト先を選び直す</span>
      <div class="lbl-sm" id="presetLbl" style="display:none;">よく使う金額</div>
      <div class="amt-presets" id="amtPresets"></div>
      <div class="lbl-sm">金額を入力</div>
      <div class="amt-input-wrap">
        <span class="amt-yen">¥</span>
        <input class="amt-input" id="amtIn" type="number" placeholder="0" inputmode="numeric">
      </div>
      <!-- 時給計算 -->
      <div class="hourly-toggle" id="hourlyToggle">🧮 時給から計算する</div>
      <div id="hourlyArea" style="display:none;background:rgba(255,255,255,0.2);border-radius:14px;padding:12px 14px;margin-bottom:14px;border:1.5px solid rgba(255,255,255,0.4);">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
          <div>
            <div class="lbl-sm" style="margin-bottom:4px;">時給 (円)</div>
            <input class="field-in" id="wageIn" type="number" placeholder="1000" inputmode="numeric" style="margin-bottom:0;">
          </div>
          <div>
            <div class="lbl-sm" style="margin-bottom:4px;">勤務時間</div>
            <div style="display:flex;gap:4px;align-items:center;">
              <select class="field-in" id="workH" style="margin-bottom:0;flex:1;text-align:center;"></select>
              <span style="font-size:11px;font-weight:700;color:var(--subtext);flex-shrink:0;">h</span>
              <select class="field-in" id="workM" style="margin-bottom:0;flex:1;text-align:center;"></select>
              <span style="font-size:11px;font-weight:700;color:var(--subtext);flex-shrink:0;">m</span>
            </div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
          <div>
            <div class="lbl-sm" style="margin-bottom:4px;">深夜割増 (倍)</div>
            <input class="field-in" id="nightRate" type="number" placeholder="1.25" step="0.05" inputmode="decimal" style="margin-bottom:0;">
          </div>
          <div>
            <div class="lbl-sm" style="margin-bottom:4px;">深夜時間</div>
            <div style="display:flex;gap:4px;align-items:center;">
              <select class="field-in" id="nightH" style="margin-bottom:0;flex:1;text-align:center;"></select>
              <span style="font-size:11px;font-weight:700;color:var(--subtext);flex-shrink:0;">h</span>
              <select class="field-in" id="nightM" style="margin-bottom:0;flex:1;text-align:center;"></select>
              <span style="font-size:11px;font-weight:700;color:var(--subtext);flex-shrink:0;">m</span>
            </div>
          </div>
        </div>
        <button class="sub-btn" id="calcBtn" style="font-size:13px;padding:10px;">計算して入力する</button>
        <div id="calcResult" style="text-align:center;font-size:13px;font-weight:700;color:var(--accent);margin-top:8px;"></div>
        <button id="savePatBtn" style="display:none;width:100%;margin-top:8px;background:none;border:1.5px dashed var(--accent);border-radius:12px;padding:8px;font-family:inherit;font-size:12px;font-weight:800;color:var(--accent);cursor:pointer;">＋ この金額をパターンに保存</button>
      </div>
      <div class="kari-row" id="kariRow">
        <div class="tog-sw" id="kariSw"></div>
        <span class="tog-lbl">🌙 仮シフト（予定・未確定）</span>
      </div>
      <button class="main-btn" id="addBtn">✅ 追加する</button>
    </div>
  </div>
</div>

<!-- COMPANY FORM -->
<div class="overlay hidden" id="coOv">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-title"><span></span><span id="coFTtl">バイト先を追加</span><button class="close-btn" id="closeCoBtn">✕</button></div>
    <label class="field-lbl">🏢 バイト先名</label>
    <input class="field-in" id="coNm" type="text" placeholder="例: スタバ、居酒屋Aなど">
    <label class="field-lbl">🎨 カラー</label>
    <div class="clr-row" id="clrPick"></div>
    <label class="field-lbl">💴 よく使う金額パターン（任意）</label>
    <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center;">
      <input class="field-in" id="patIn" type="number" placeholder="例: 8500" inputmode="numeric" style="margin-bottom:0;flex:1;">
      <button class="sub-btn" id="addPatBtn" style="width:auto;padding:0 18px;height:44px;white-space:nowrap;flex-shrink:0;">＋ 追加</button>
    </div>
    <div id="patList" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;min-height:10px;"></div>
    <button class="sub-btn" id="saveCoBtn">保存する</button>
    <button class="del-btn" id="delCoBtn" style="display:none;">🗑️ このバイト先を削除</button>
  </div>
</div>

<!-- BG MENU -->
<div class="c-overlay hidden" id="bgMenuOv">
  <div class="modal">
    <div class="modal-ttl">🖼️ 背景画像</div>
    <button class="sub-btn" id="bgPickBtn" style="margin-bottom:10px;">📂 画像を選ぶ</button>
    <button class="del-btn" id="bgDelBtn">🔄 デフォルトに戻す</button>
    <button id="bgCancelBtn" style="width:100%;margin-top:10px;background:none;border:none;font-family:inherit;font-size:13px;color:var(--subtext);cursor:pointer;padding:8px;">キャンセル</button>
  </div>
</div>

<!-- GOAL MODAL -->
<div class="c-overlay hidden" id="goalOv">
  <div class="modal">
    <div class="modal-ttl">🎯 今月の目標金額</div>
    <label class="field-lbl">目標金額 (円)</label>
    <input class="field-in" id="goalIn" type="number" placeholder="例: 150000">
    <button class="sub-btn" id="saveGoalBtn">設定する</button>
    <button id="cancelGoalBtn" style="width:100%;margin-top:8px;background:none;border:none;font-family:inherit;font-size:13px;color:var(--subtext);cursor:pointer;padding:8px;">キャンセル</button>
  </div>
</div>

<div class="bottom-bar">
  <span class="th-lbl">テーマ:</span>
  <button class="th-btn t1" data-theme=""></button>
  <button class="th-btn t2" data-theme="theme-blue"></button>
  <button class="th-btn t3" data-theme="theme-peach"></button>
  <div class="bar-sep"></div>
  <button class="bg-img-btn" id="openBgBtn">🖼️ 背景画像</button>
</div>

<script>
const SK='shiftApp_v5';
const COLORS=['#FF8C94','#FFB347','#FFD966','#9EDFD6','#7BC6BE','#BFD7FF','#C9A7FF','#FF9ECD','#A8E6CF','#74C0E8'];
let S={companies:[],cal:{},goals:{},theme:''};
let curY,curM,selDay=null,kariMode=false,selCoId=null;
let editCoId=null,selClr=COLORS[3],editPatterns=[];

function ld(){
  try{const d=localStorage.getItem(SK);if(d)S=JSON.parse(d);}catch(e){}
  if(!S.companies)S.companies=[];
  if(!S.cal)S.cal={};
  if(!S.goals)S.goals={};
  if(!S.theme)S.theme='';
  // 旧データ移行
  S.companies.forEach(co=>{
    if(!co.patterns)co.patterns=(co.shifts||[]).map(s=>s.amount).filter(a=>a>0);
    delete co.shifts;
  });
}
function sv(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}
function uid(){return Math.random().toString(36).slice(2,10);}
function dkey(y,m,d){return`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}

function init(){
  ld();
  const n=new Date();curY=n.getFullYear();curM=n.getMonth();
  applyTh(S.theme,false);
  loadBgImg();
  bindEvents();
  render();
}
function render(){rLbl();rCal();rStats();rCos();}

function bindEvents(){
  document.getElementById('prevM').addEventListener('click',()=>chM(-1));
  document.getElementById('nextM').addEventListener('click',()=>chM(1));
  document.getElementById('tCal').addEventListener('click',()=>swTab('cal'));
  document.getElementById('tCo').addEventListener('click',()=>swTab('co'));
  document.getElementById('gTxt').addEventListener('click',openGoal);
  document.getElementById('saveGoalBtn').addEventListener('click',saveGoal);
  document.getElementById('cancelGoalBtn').addEventListener('click',closeGoal);
  document.getElementById('goalOv').addEventListener('click',e=>{if(e.target===document.getElementById('goalOv'))closeGoal();});
  document.getElementById('closeDayBtn').addEventListener('click',closeDay);
  document.getElementById('dayOv').addEventListener('click',e=>{if(e.target===document.getElementById('dayOv'))closeDay();});
  document.getElementById('backLnk').addEventListener('click',toS1);
  document.getElementById('kariRow').addEventListener('click',togKari);
  document.getElementById('addBtn').addEventListener('click',doAdd);
  document.getElementById('hourlyToggle').addEventListener('click',()=>{
    const area=document.getElementById('hourlyArea');
    const open=area.style.display==='none';
    area.style.display=open?'':'none';
    document.getElementById('hourlyToggle').textContent=open?'🧮 時給計算を閉じる':'🧮 時給から計算する';
  });
  document.getElementById('calcBtn').addEventListener('click',calcHourly);
  document.getElementById('savePatBtn').addEventListener('click',saveCalcToPattern);
  // 時間セレクト生成
  ['workH','nightH'].forEach(id=>{
    const el=document.getElementById(id);
    for(let i=0;i<=24;i++)el.innerHTML+=`<option value="${i}">${i}</option>`;
  });
  ['workM','nightM'].forEach(id=>{
    const el=document.getElementById(id);
    for(let i=0;i<60;i+=5)el.innerHTML+=`<option value="${i}">${String(i).padStart(2,'0')}</option>`;
  });
  document.getElementById('workH').value=8;
  document.getElementById('amtIn').addEventListener('input',()=>{
    document.querySelectorAll('.amt-preset-btn').forEach(b=>b.classList.remove('sel'));
  });
  document.getElementById('addCoBtn').addEventListener('click',()=>openCoForm());
  document.getElementById('closeCoBtn').addEventListener('click',closeCo);
  document.getElementById('coOv').addEventListener('click',e=>{if(e.target===document.getElementById('coOv'))closeCo();});
  document.getElementById('saveCoBtn').addEventListener('click',saveCo);
  document.getElementById('delCoBtn').addEventListener('click',delCo);
  document.getElementById('addPatBtn').addEventListener('click',addPat);
  document.getElementById('patIn').addEventListener('keydown',e=>{if(e.key==='Enter')addPat();});
  document.getElementById('openBgBtn').addEventListener('click',openBgMenu);
  document.getElementById('bgPickBtn').addEventListener('click',()=>{document.getElementById('bgFileIn').click();closeBgMenu();});
  document.getElementById('bgDelBtn').addEventListener('click',()=>{removeBgImg();closeBgMenu();});
  document.getElementById('bgCancelBtn').addEventListener('click',closeBgMenu);
  document.getElementById('bgMenuOv').addEventListener('click',e=>{if(e.target===document.getElementById('bgMenuOv'))closeBgMenu();});
  document.getElementById('bgFileIn').addEventListener('change',onBgFile);
  document.querySelectorAll('.th-btn').forEach(btn=>{
    btn.addEventListener('click',()=>setTh(btn.dataset.theme));
  });
}

function swTab(t){
  document.getElementById('vCal').style.display=t==='cal'?'':'none';
  document.getElementById('vCo').style.display=t==='co'?'':'none';
  document.getElementById('tCal').classList.toggle('active',t==='cal');
  document.getElementById('tCo').classList.toggle('active',t==='co');
}
function chM(d){curM+=d;if(curM>11){curM=0;curY++;}if(curM<0){curM=11;curY--;}rLbl();rCal();rStats();}
function rLbl(){const mn=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];document.getElementById('mLbl').textContent=`${curY}年 ${mn[curM]}`;}

function mTotal(wk){let t=0;const p=`${curY}-${String(curM).padStart(2,'0')}`;Object.keys(S.cal).forEach(k=>{if(!k.startsWith(p))return;(S.cal[k]||[]).forEach(e=>{if(!e.kari||wk)t+=Number(e.amount)||0;});});return t;}
function yTotal(){let t=0;const p=`${curY}-`;Object.keys(S.cal).forEach(k=>{if(!k.startsWith(p))return;(S.cal[k]||[]).forEach(e=>{if(!e.kari)t+=Number(e.amount)||0;});});return t;}
function rStats(){
  const c=mTotal(false),k=mTotal(true),y=yTotal();
  document.getElementById('sM').textContent='¥'+c.toLocaleString();
  document.getElementById('sK').textContent='¥'+k.toLocaleString();
  document.getElementById('sY').textContent='¥'+y.toLocaleString();
  const gk=`${curY}-${curM}`,goal=S.goals[gk]||0;
  if(goal>0){const rem=Math.max(0,goal-k),pct=Math.min(100,k/goal*100);
    document.getElementById('gFill').style.width=pct+'%';
    document.getElementById('gTxt').textContent=rem===0?'🎉 達成！':`あと¥${rem.toLocaleString()}`;}
  else{document.getElementById('gFill').style.width='0%';document.getElementById('gTxt').textContent='目標未設定';}
}

function rCal(){
  const w=document.getElementById('calDays');w.innerHTML='';
  const first=new Date(curY,curM,1).getDay(),days=new Date(curY,curM+1,0).getDate(),td=new Date();
  for(let i=0;i<first;i++){const e=document.createElement('div');e.className='cal-day empty';w.appendChild(e);}
  for(let d=1;d<=days;d++){
    const col=(first+d-1)%7,key=dkey(curY,curM,d),ents=S.cal[key]||[];
    const isT=td.getFullYear()===curY&&td.getMonth()===curM&&td.getDate()===d;
    const hc=ents.some(e=>!e.kari),hk=ents.some(e=>e.kari);
    const el=document.createElement('div');
    let cls=`cal-day ${col===0?'col-sun':col===6?'col-sat':'col-wd'}`;
    if(isT)cls+=' today';else if(hc&&hk)cls+=' has-ck';else if(hc)cls+=' has-c';else if(hk)cls+=' has-k';
    el.className=cls;
    let html=`<span class="day-num">${d}</span><div class="day-chips">`;
    ents.slice(0,2).forEach(e=>{
      const co=S.companies.find(c=>c.id===e.companyId);
      if(!co)return;
      html+=`<div class="day-chip"><span class="chip-co">${co.name}</span><span class="chip-am">¥${Number(e.amount).toLocaleString()}</span></div>`;
    });
    if(ents.length>2)html+=`<span style="font-size:8px;color:var(--subtext)">+${ents.length-2}</span>`;
    html+=`</div>`;
    if(hk)html+=`<div class="kari-dot"></div>`;
    el.innerHTML=html;
    el.addEventListener('click',()=>openDay(d));
    w.appendChild(el);
  }
}

// DAY SHEET
function openDay(d){
  selDay=d;kariMode=false;selCoId=null;
  const mn=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const dw=['日','月','火','水','木','金','土'];
  document.getElementById('dayTtl').textContent=`${mn[curM]}${d}日 (${dw[new Date(curY,curM,d).getDay()]})`;
  document.getElementById('kariSw').className='tog-sw';
  document.getElementById('amtIn').value='';
  rEntries();toS1();
  document.getElementById('dayOv').classList.remove('hidden');
}
function closeDay(){document.getElementById('dayOv').classList.add('hidden');selDay=null;}

function rEntries(){
  const key=dkey(curY,curM,selDay),ents=S.cal[key]||[];
  const el=document.getElementById('eList');el.innerHTML='';
  ents.forEach((e,i)=>{
    const co=S.companies.find(c=>c.id===e.companyId);
    const div=document.createElement('div');
    div.className='entry-item'+(e.kari?' ek':'');
    div.innerHTML=`<div class="e-clr" style="background:${co?co.color:'#ccc'}"></div>
      <div class="e-info"><div class="e-co">${co?co.name:'不明'}${e.kari?'<span class="e-kb">仮</span>':''}</div></div>
      <div class="e-am">¥${Number(e.amount).toLocaleString()}</div>
      <button class="e-del">×</button>`;
    div.querySelector('.e-del').addEventListener('click',()=>delEnt(i));
    el.appendChild(div);
  });
}
function delEnt(i){
  const key=dkey(curY,curM,selDay);
  S.cal[key].splice(i,1);
  if(!S.cal[key].length)delete S.cal[key];
  sv();rEntries();rCal();rStats();
}

function toS1(){
  selCoId=null;
  document.getElementById('hourlyArea').style.display='none';
  document.getElementById('hourlyToggle').textContent='🧮 時給から計算する';
  document.getElementById('calcResult').textContent='';
  document.getElementById('savePatBtn').style.display='none';
  document.getElementById('savePatBtn').textContent='＋ この金額をパターンに保存';
  document.getElementById('savePatBtn').style.borderColor='';
  document.getElementById('savePatBtn').style.color='';
  document.getElementById('s1').style.display='';
  document.getElementById('s2').style.display='none';
  const grid=document.getElementById('coSelGrid');
  const msg=document.getElementById('noCoMsg');
  grid.innerHTML='';
  if(!S.companies.length){msg.style.display='';return;}
  msg.style.display='none';
  S.companies.forEach(co=>{
    const btn=document.createElement('button');
    btn.className='co-sel-btn';
    btn.innerHTML=`<div class="csd" style="background:${co.color}"></div><span class="csn">${co.name}</span>`;
    btn.addEventListener('click',()=>selCo(co.id));
    grid.appendChild(btn);
  });
}

function selCo(id){
  selCoId=id;
  const co=S.companies.find(c=>c.id===id);if(!co)return;
  document.getElementById('s1').style.display='none';
  document.getElementById('s2').style.display='';
  document.getElementById('kariSw').className='tog-sw';kariMode=false;
  document.getElementById('amtIn').value='';
  const presetsEl=document.getElementById('amtPresets');
  const presetLbl=document.getElementById('presetLbl');
  presetsEl.innerHTML='';
  const pats=co.patterns||[];
  presetLbl.style.display=pats.length?'':'none';
  pats.forEach(amt=>{
    const btn=document.createElement('button');
    btn.className='amt-preset-btn';
    btn.textContent='¥'+Number(amt).toLocaleString();
    btn.addEventListener('click',()=>{
      document.getElementById('amtIn').value=amt;
      presetsEl.querySelectorAll('.amt-preset-btn').forEach(b=>b.classList.remove('sel'));
      btn.classList.add('sel');
    });
    presetsEl.appendChild(btn);
  });
}

function togKari(){kariMode=!kariMode;document.getElementById('kariSw').className='tog-sw'+(kariMode?' on':'');}

function doAdd(){
  if(!selCoId){alert('バイト先を選んでください');return;}
  const amt=parseInt(document.getElementById('amtIn').value)||0;
  if(!amt){alert('金額を入力してください');return;}
  const co=S.companies.find(c=>c.id===selCoId);if(!co)return;
  const key=dkey(curY,curM,selDay);
  if(!S.cal[key])S.cal[key]=[];
  S.cal[key].push({companyId:co.id,kari:kariMode,amount:amt});
  sv();rEntries();rCal();rStats();
  selCoId=null;kariMode=false;
  document.getElementById('amtIn').value='';
  closeDay();
}

// COMPANY FORM
function rCos(){
  const el=document.getElementById('coList');
  if(!S.companies.length){el.innerHTML=`<div class="empty-st"><span class="emo-big">🏢</span>まだ登録がありません</div>`;return;}
  el.innerHTML='';
  S.companies.forEach(co=>{
    const div=document.createElement('div');
    div.className='co-card';
    const pats=co.patterns||[];
    div.innerHTML=`<div class="co-header">
        <div class="co-dot" style="background:${co.color}"></div>
        <div class="co-name">${co.name}</div>
        <div><button class="ico-btn">✏️</button></div>
      </div>
      <div class="amt-patterns">
        ${pats.length?pats.map(a=>`<span class="amt-badge">¥${Number(a).toLocaleString()}</span>`).join(''):'<span style="font-size:12px;color:var(--subtext);">パターン未登録</span>'}
      </div>`;
    div.querySelector('.ico-btn').addEventListener('click',()=>openCoForm(co.id));
    el.appendChild(div);
  });
}

function openCoForm(coId){
  editCoId=coId||null;
  const co=coId?S.companies.find(c=>c.id===coId):null;
  document.getElementById('coFTtl').textContent=co?'バイト先を編集':'バイト先を追加';
  document.getElementById('coNm').value=co?co.name:'';
  selClr=co?co.color:COLORS[3];
  editPatterns=co?(co.patterns||[]).slice():[];
  document.getElementById('patIn').value='';
  document.getElementById('delCoBtn').style.display=co?'block':'none';
  const cp=document.getElementById('clrPick');cp.innerHTML='';
  COLORS.forEach(c=>{
    const b=document.createElement('button');
    b.className='clr-sw'+(c===selClr?' sel':'');
    b.style.background=c;
    b.addEventListener('click',()=>{selClr=c;cp.querySelectorAll('.clr-sw').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');});
    cp.appendChild(b);
  });
  rPatList();
  document.getElementById('coOv').classList.remove('hidden');
}

function rPatList(){
  const el=document.getElementById('patList');el.innerHTML='';
  editPatterns.forEach((amt,i)=>{
    const span=document.createElement('span');
    span.className='amt-badge';
    span.innerHTML=`¥${Number(amt).toLocaleString()} <span class="del-x">✕</span>`;
    span.querySelector('.del-x').addEventListener('click',()=>{editPatterns.splice(i,1);rPatList();});
    el.appendChild(span);
  });
}

function addPat(){
  const v=parseInt(document.getElementById('patIn').value)||0;
  if(!v)return;
  if(!editPatterns.includes(v))editPatterns.push(v);
  document.getElementById('patIn').value='';
  rPatList();
}

function closeCo(){document.getElementById('coOv').classList.add('hidden');}

function saveCo(){
  const nm=document.getElementById('coNm').value.trim();
  if(!nm){alert('バイト先名を入力してください');return;}
  if(editCoId){
    const co=S.companies.find(c=>c.id===editCoId);
    if(co){co.name=nm;co.color=selClr;co.patterns=editPatterns.slice();}
  }else{
    S.companies.push({id:uid(),name:nm,color:selClr,patterns:editPatterns.slice()});
  }
  sv();rCos();closeCo();
}

function delCo(){
  if(!editCoId)return;
  S.companies=S.companies.filter(c=>c.id!==editCoId);
  sv();rCos();closeCo();
}

function calcHourly(){
  const wage=parseFloat(document.getElementById('wageIn').value)||0;
  const wh=Math.min(24,Math.max(0,parseFloat(document.getElementById('workH').value)||0));
  const wm=Math.min(59,Math.max(0,parseFloat(document.getElementById('workM').value)||0));
  const nh=Math.min(24,Math.max(0,parseFloat(document.getElementById('nightH').value)||0));
  const nm=Math.min(59,Math.max(0,parseFloat(document.getElementById('nightM').value)||0));
  const nr=parseFloat(document.getElementById('nightRate').value)||1;
  const totalH=wh+wm/60;
  const nightTotalH=nh+nm/60;
  const normalH=Math.max(0,totalH-nightTotalH);
  const total=Math.round(wage*normalH+wage*nr*nightTotalH);
  if(!wage||!totalH){document.getElementById('calcResult').textContent='時給と勤務時間を入力してください';document.getElementById('savePatBtn').style.display='none';return;}
  document.getElementById('amtIn').value=total;
  document.getElementById('calcResult').textContent=`計算結果: ¥${total.toLocaleString()}`;
  document.getElementById('savePatBtn').style.display='';
  document.getElementById('savePatBtn').dataset.amt=total;
  document.querySelectorAll('.amt-preset-btn').forEach(b=>b.classList.remove('sel'));
}

function saveCalcToPattern(){
  const amt=parseInt(document.getElementById('savePatBtn').dataset.amt)||0;
  if(!amt||!selCoId)return;
  const co=S.companies.find(c=>c.id===selCoId);
  if(!co)return;
  if(!co.patterns)co.patterns=[];
  if(co.patterns.includes(amt)){document.getElementById('savePatBtn').textContent='✅ 追加済み';return;}
  co.patterns.push(amt);
  sv();
  // プリセットボタン再描画
  const presetsEl=document.getElementById('amtPresets');
  const presetLbl=document.getElementById('presetLbl');
  presetsEl.innerHTML='';
  presetLbl.style.display='';
  co.patterns.forEach(a=>{
    const btn=document.createElement('button');
    btn.className='amt-preset-btn';
    btn.textContent='¥'+Number(a).toLocaleString();
    btn.addEventListener('click',()=>{
      document.getElementById('amtIn').value=a;
      presetsEl.querySelectorAll('.amt-preset-btn').forEach(b=>b.classList.remove('sel'));
      btn.classList.add('sel');
    });
    presetsEl.appendChild(btn);
  });
  document.getElementById('savePatBtn').textContent='✅ パターンに追加しました';
  document.getElementById('savePatBtn').style.borderColor='var(--main)';
  document.getElementById('savePatBtn').style.color='var(--accent2)';
}

// GOAL
function openGoal(){const gk=`${curY}-${curM}`;document.getElementById('goalIn').value=S.goals[gk]||'';document.getElementById('goalOv').classList.remove('hidden');}
function closeGoal(){document.getElementById('goalOv').classList.add('hidden');}
function saveGoal(){S.goals[`${curY}-${curM}`]=parseInt(document.getElementById('goalIn').value)||0;sv();rStats();closeGoal();}

// THEME
function applyTh(cls,persist=true){
  document.body.className=cls+(S.bgImg?' has-bg-img':'');
  if(persist){S.theme=cls;sv();}
  document.querySelectorAll('.th-btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===cls));
}
function setTh(c){applyTh(c);}

// BG IMAGE
const BG_SK='shiftApp_bgImg';
function openBgMenu(){document.getElementById('bgMenuOv').classList.remove('hidden');}
function closeBgMenu(){document.getElementById('bgMenuOv').classList.add('hidden');}
function onBgFile(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const url=ev.target.result;
    try{localStorage.setItem(BG_SK,url);}catch(err){alert('画像が大きすぎます');return;}
    S.bgImg=true;sv();applyBgImg(url);
  };
  reader.readAsDataURL(file);e.target.value='';
}
function applyBgImg(url){document.getElementById('bgImageLayer').style.backgroundImage=`url(${url})`;document.body.classList.add('has-bg-img');}
function removeBgImg(){localStorage.removeItem(BG_SK);S.bgImg=false;sv();document.getElementById('bgImageLayer').style.backgroundImage='none';document.body.classList.remove('has-bg-img');applyTh(S.theme,false);}
function loadBgImg(){try{const s=localStorage.getItem(BG_SK);if(s){S.bgImg=true;applyBgImg(s);}}catch(e){}}

init();
</script>
</body>
</html>
